scan_timeout=200

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$python\
$conda\
$nodejs\
$line_break\
$character"""

[directory]
truncation_length = 1
format = '[$path]($style)[$lock_symbol]($lock_style) '
truncation_symbol = 'о—ѕ/'
style = 'bold blue'
read_only = ' п Ѕ'

[character]
success_symbol = "[вќЇ](green)"
error_symbol = "[вќЇ](red)"
vimcmd_symbol = "[вќ®](grey)"

[git_branch]
format = "[$branch]($style)"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](red bold) ($ahead_behind)]($style)"
style = "grey"
conflicted = "вЂ‹"
untracked = "вЂ‹"
modified = "вЂ‹"
staged = "вЂ‹"
renamed = "вЂ‹"
deleted = "вЂ‹"
ahead = 'п…¶ '
behind = 'п…µ '
diverged = 'п…¶п…µ '

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style)"
style = "grey"

[conda]
format = '[$environment](dimmed green) '

[nodejs]
format = '[$version](dimmed blue) '
