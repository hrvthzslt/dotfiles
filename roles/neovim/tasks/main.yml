---
- name: install
  tags:
    - neovim
    - install
    - cli
  block:
    - name: install
      include_tasks: roles/nix/tasks/install_package.yml
      vars:
        package: neovim
        derivation: neovim

    - name: install tree-sitter-cli via cargo
      ansible.builtin.shell: |
        cargo install --locked tree-sitter-cli
      args:
        creates: "{{ ansible_env.HOME }}/.cargo/bin/tree-sitter"
      tags:
        - tree-sitter
        - cargo

- name: symlink config
  tags:
    - neovim
    - link
    - cli
  block:
    - name: create config directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/nvim"
        state: directory

    - name: symlink config
      ansible.builtin.file:
        src: "{{ role_path }}/files/nvim"
        dest: "{{ ansible_env.HOME }}/.config/nvim"
        state: link
        force: yes
